<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="stylesheet" href="./style.css">
    <title>Battleship game</title>
</head>

<body>
    <button id="themeBtn" class="btn-icon" title="Toggle dark/light">◐</button>
    <h1 id="gameName"><span class="title-main">Battleship</span> <span class="title-sub">game</span></h1>
    <main>
        <h2 id="endGameH2"></h2>
        <div class="boardWrapper">
            <h2 id="aiBoardH2" class="boardH2">Ai board</h2>
            <div class="boardCoords">
                <div class="coordLetters" id="aiCoordLetters"></div>
                <div class="coordNumbers" id="aiCoordNumbers"></div>
                <div id="aiBoard" class="gameBoard"></div>
            </div>
        </div>
        <div class="boardWrapper">
            <h2 id="playerBoardH2" class="boardH2">Player board</h2>
            <div class="boardCoords">
                <div class="coordLetters" id="playerCoordLetters"></div>
                <div class="coordNumbers" id="playerCoordNumbers"></div>
                <div id="playerBoard" class="gameBoard"></div>
            </div>
        </div>
        <h2 id="verticalInfo" class="boardH2">set vertical (Press r to change direction)</h2>
    </main>
</body>
<script src="script.js" type="text/javascript"></script>
</html>
